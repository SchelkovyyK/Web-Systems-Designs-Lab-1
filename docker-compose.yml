services:
  frontend:
    build:
      context: ./frontend/App
      dockerfile: Dockerfile

    volumes:
      - ./frontend/App:/app
      - /app/node_modules

    expose:
      - "5173"

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: npm run dev -- --host 0.0.0.0

    networks:
      - frontend_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/var/www

    working_dir: /var/www

    env_file:
      - ./backend/.env

    networks:
      - frontend_net
      - backend_net

  nginx:
    image: nginx:1.27-alpine

    ports:
      - "8080:80"

    volumes:
      - ./frontend/App/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

    networks:
      - frontend_net
      - backend_net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wsd_taskboard
      POSTGRES_USER: wsd
      POSTGRES_PASSWORD: wsdpass

    volumes:
      - db_data:/var/lib/postgresql/data

    networks:
      - backend_net

  redis:
    image: redis:7-alpine

    volumes:
      - redis_data:/data

    networks:
      - backend_net

networks:
  frontend_net:
  backend_net:

volumes:
  db_data:
  redis_data: