services:

  
  db:
    image: postgres:15
    container_name: db
    restart: always
    environment:
      POSTGRES_DB: wsd_tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  
  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
      - redis
    expose:
      - "9000"

  frontend:
    build:
      context: ./frontend/App
    container_name: frontend
    restart: always
    working_dir: /app
    volumes:
      - ./frontend/App:/app
    expose:
      - "5173"

  
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./frontend/App/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/App/dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend

volumes:
  pgdata: